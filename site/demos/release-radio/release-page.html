<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Release Radio Demo Page</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #0b0b0b; color: #f5f5f5; }
    main { max-width: 760px; margin: 0 auto; }
    h1 { color: #ff6600; }
    .chip { display: inline-block; padding: .25rem .6rem; border: 1px solid #444; border-radius: 999px; margin-right: .4rem; color: #ffb366; }
  </style>
</head>
<body>
  <main>
    <h1>Release Radio Demo Page</h1>
    <p>This file is a rendered Bonfyre demo artifact for the release-note app.</p>
    <p>
      <span class="chip">bonfyre-brief</span>
      <span class="chip">bonfyre-narrate</span>
      <span class="chip">bonfyre-render</span>
      <span class="chip">bonfyre-emit</span>
    </p>
    <p>The same source release note becomes a scripted brief, spoken bulletin, web page, and RSS feed.</p>
  </main>
</body>
</html>
