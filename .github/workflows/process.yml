name: Bonfyre Pipeline — Release-Note Radio
on:
  push:
    branches: [main]
    paths: ['input/**']
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: bonfyre-pipeline
  cancel-in-progress: false
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Build Bonfyre binaries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlite3-dev pandoc
          git clone --depth 1 https://github.com/Nickgonzales76017/bonfyre-oss.git /tmp/bonfyre
          chmod +x /tmp/bonfyre/scripts/build-portable-runtime.sh
          /tmp/bonfyre/scripts/build-portable-runtime.sh \
            BonfyreBrief BonfyreTag BonfyreNarrate BonfyreRender BonfyreEmit
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Detect new files
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(git ls-files 'input/**' || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'input/' || true)
          fi
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" > /tmp/changed_files.txt
          fi
      - name: Run pipeline
        if: steps.detect.outputs.skip != 'true'
        run: |
          mkdir -p artifacts site

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            base=$(basename "$f" | sed "s/\.[^.]*$//")
            ext="${f##*.}"
            case "$ext" in
              md|txt|json)
                bonfyre-brief "$f" --out "artifacts/${base}.brief.json"
                bonfyre-tag "artifacts/${base}.brief.json" --out "artifacts/${base}.tags.json"
                bonfyre-narrate "artifacts/${base}.brief.json" --out "artifacts/${base}.narrate.json"
                bonfyre-render "artifacts/${base}.narrate.json" --template episode --out "site/episodes/${base}.html"
                ;;
              wav|mp3|m4a|ogg|flac|webm)
                bonfyre-media-prep "$f" --out "artifacts/${base}.prep.json"
                bonfyre-transcribe "artifacts/${base}.prep.json" --out "artifacts/${base}.transcript.json"
                bonfyre-brief "artifacts/${base}.transcript.json" --out "artifacts/${base}.brief.json"
                bonfyre-tag "artifacts/${base}.brief.json" --out "artifacts/${base}.tags.json"
                ;;
            esac
          done < /tmp/changed_files.txt
          mkdir -p site/episodes site/feed
          bonfyre-emit artifacts/ --out site/ --format html
          bonfyre-emit artifacts/ --out site/feed/ --format rss
      - name: Commit results
        if: steps.detect.outputs.skip != 'true'
        run: |
          git config user.name "Bonfyre Pipeline"
          git config user.email "bonfyre-bot@users.noreply.github.com"
          git add artifacts/ site/
          git diff --cached --quiet && exit 0
          git commit -m "[pipeline] processed $(cat /tmp/changed_files.txt | wc -l | tr -d ' ') file(s)"
          git push
  deploy:
    needs: process
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
