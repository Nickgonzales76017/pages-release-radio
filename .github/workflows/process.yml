name: Bonfyre Pipeline — Release-Note Radio
on:
  push:
    branches: [main]
    paths: ['input/**']
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: bonfyre-pipeline
  cancel-in-progress: false
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Build Bonfyre binaries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlite3-dev pandoc
          git clone --depth 1 https://github.com/Nickgonzales76017/bonfyre-oss.git /tmp/bonfyre
          chmod +x /tmp/bonfyre/scripts/build-portable-runtime.sh
          /tmp/bonfyre/scripts/build-portable-runtime.sh \
            BonfyreBrief BonfyreNarrate BonfyreRender BonfyreEmit
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "BONFYRE_BRIEF_BINARY=$HOME/.local/bin/bonfyre-brief" >> "$GITHUB_ENV"
          echo "BONFYRE_NARRATE_BINARY=$HOME/.local/bin/bonfyre-narrate" >> "$GITHUB_ENV"
      - name: Detect new files
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(git ls-files 'input/**' || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'input/' || true)
          fi
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" > /tmp/changed_files.txt
          fi
      - name: Run pipeline
        if: steps.detect.outputs.skip != 'true'
        run: |
          mkdir -p artifacts site

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            base=$(basename "$f" | sed "s/\.[^.]*$//")
            ext="${f##*.}"
            case "$ext" in
              md|txt|json)
                bonfyre-render artifact "$f" "artifacts/${base}" --title "$base"
                bonfyre-emit "artifacts/${base}/brief" --format html --out "site/episodes/${base}.html"
                bonfyre-emit "artifacts/${base}/brief" --format rss --out "site/feed/${base}.rss"
                ;;
              wav|mp3|m4a|ogg|flac|webm)
                echo "Skipping raw audio on portable runner: $f"
                ;;
            esac
          done < /tmp/changed_files.txt
          mkdir -p site/episodes site/feed
      - name: Commit results
        if: steps.detect.outputs.skip != 'true'
        run: |
          git config user.name "Bonfyre Pipeline"
          git config user.email "bonfyre-bot@users.noreply.github.com"
          git add artifacts/ site/
          git diff --cached --quiet && exit 0
          git commit -m "[pipeline] processed $(cat /tmp/changed_files.txt | wc -l | tr -d ' ') file(s)"
          git push
  deploy:
    needs: process
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
